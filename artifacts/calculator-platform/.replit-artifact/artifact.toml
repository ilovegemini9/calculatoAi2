kind = "web"
    previewPath = "/"
    title = "Professional Calculator Platform"
    version = "1.0.0"
    id = "artifacts/calculator-platform"
    router = "path"

    [[services]]
    name = "web"
    paths = [ "/" ]
    localPort = 23007

    [services.development]
    run = "pnpm --filter @workspace/calculator-platform run dev"

    [services.production]
    build = [ "pnpm", "--filter", "@workspace/calculator-platform", "run", "build" ]
    serve = "static"
    publicDir = "artifacts/calculator-platform/dist/public"

    [[services.production.rewrites]]
    from = "/*"
    to = "/index.html"

    [services.env]
    PORT = "23007"
    BASE_PATH = "/"
