<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional Calculator Platform - 100% Client-Side Fast Calculators</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter" error in sandbox/iframe environments
      (function() {
        try {
          var currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            var proto = Object.getPrototypeOf(window);
            if (proto) {
              var originalFetch = proto.fetch;
              Object.defineProperty(proto, 'fetch', {
                get: function() {
                  return currentFetch || originalFetch;
                },
                set: function(val) {
                  currentFetch = val;
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (err) {
            console.warn('Unable to patch window.fetch:', err);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/App.tsx"></script>
  </body>
</html>
